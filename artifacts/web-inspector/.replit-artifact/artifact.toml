kind = "web"
previewPath = "/"
title = "Web Inspector"
version = "1.0.0"
id = "artifacts/web-inspector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21450

[services.development]
run = "pnpm --filter @workspace/web-inspector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-inspector", "run", "build" ]
publicDir = "artifacts/web-inspector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21450"
BASE_PATH = "/"
